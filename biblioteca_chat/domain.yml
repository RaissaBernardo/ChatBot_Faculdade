yamlversion: "3.1"

intents:
  - saudacao
  - buscar_livro_por_titulo
  - buscar_livro_por_autor
  - buscar_livro_por_assunto
  - despedida

entities:
  - titulo
  - autor
  - assunto

slots:
  titulo:
    type: text
    mappings:
    - type: from_entity
      entity: titulo
  autor:
    type: text
    mappings:
    - type: from_entity
      entity: autor

responses:
  utter_saudacao:
    - text: "Olá! Como posso ajudar com sua busca por livros?"
  utter_despedida:
    - text: "Até logo! Volte sempre para novas descobertas literárias!"
  utter_perguntar_titulo:
    - text: "Qual título de livro você está procurando?"
  utter_perguntar_autor:
    - text: "Qual autor você gostaria de encontrar?"

actions:
  - action_buscar_por_titulo
  - action_buscar_por_autor